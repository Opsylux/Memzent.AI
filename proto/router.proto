// proto/router.proto
syntax = "proto3";

package router;

// Ensure this matches your gateway's internal directory structure
option go_package = "github.com/Opsylux/memzent/services/gateway/internal/router";

service SemanticRouter {
  // Selects the most relevant tools for a given user prompt
  rpc SelectTools (ToolRequest) returns (ToolResponse);

  // Registers or updates a tool in the vector database
  rpc RegisterTool (RegisterToolRequest) returns (RegisterToolResponse);
}

message RegisterToolRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string org_id = 4;
}

message RegisterToolResponse {
  bool success = 1;
  string error = 2;
}


message ToolRequest {
  string prompt = 1;
  string user_id = 2;
  repeated string allowed_tool_ids = 3; // For RBAC-filtered searches
  float score_threshold_override = 4; // Override default relevance threshold
}

message Tool {
  string id = 1;
  string name = 2;
  float relevance_score = 3;
  string description = 4; // Tool description from Qdrant
}

message ToolResponse {
  repeated Tool tools = 1;
  int32 total_tokens_saved = 2; 
  string compressed_prompt = 3;
  string similar_prompt_hash = 4; // Hash of a previously seen similar prompt (if any)
  string current_prompt_hash = 5; // Canonical hash of the incoming prompt
}


