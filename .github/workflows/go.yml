name: Gateway (Go)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: services/gateway

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: services/gateway/go.sum

      - name: Build
        run: go build -v .

      - name: Test
        run: go test ./... -race -count=1

  integration:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: services/gateway/go.sum

      - name: Integration tests (Valkey)
        env:
          VALKEY_ADDR: localhost:6379
        run: go test -tags=integration ./tests/integration/... -count=1 -v
