# Lightweight stack for gateway integration tests (Sprint 5).
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   cd services/gateway && go test -tags=integration ./tests/integration/... -count=1
#   docker compose -f docker-compose.test.yml down

services:
  valkey:
    image: valkey/valkey:8.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  router:
    build:
      context: .
      dockerfile: services/router/Dockerfile.prod
    environment:
      QDRANT_URL: "http://qdrant:6334"
      SNAPSHOT_INTERVAL_HOURS: "0"
    ports:
      - "50051:50051"
    depends_on:
      qdrant:
        condition: service_healthy
