services:
  # Valkey Caching Layer
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    command: [ "valkey-server", "--io-threads", "4" ]

  # Aura MCP Server (Go)
  mcp-server:
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    container_name: aura-mcp-server
    depends_on:
      - valkey
    environment:
      - VALKEY_ADDR=valkey:6379
    ports:
      - "50052:50052"
    volumes:
      - ./services/mcp-server:/app
    working_dir: /app

  # Intelligence Layer (Vector Store)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aura-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # Governance Layer (Structured Data)
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_DB: aura_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  # Aura Semantic Router (Rust)
  router:
    build:
      context: .
      dockerfile: ./services/router/Dockerfile
    container_name: aura-router
    volumes:
      # Keep these to share source files
      - ./services/router:/app
      - ./proto:/proto
      # Cache for ML models mapped to avoid redownloading
      - ./.cache/huggingface:/root/.cache
      # Keeps heavy compilation artifacts strictly inside the fast Linux container
      - /app/target
    environment:
      QDRANT_URL: "http://qdrant:6334"
    working_dir: /app
    command: cargo run
    depends_on:
      - qdrant

  # Aura Gateway (Go) - Optimized
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: aura-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway:/app
      - ./proto:/proto
      - go_modules:/go/pkg/mod
    environment:
      - OPENAI_MODEL=gpt-4o-mini
      - JWT_SECRET=aura-enterprise-secret-2026
      - OLLAMA_ENABLED=true
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    # OPTIMIZED: Checks for mod file, compiles to binary, and fires up instantly!
    command: >
      sh -c "if [ ! -f go.mod ]; then go mod init aura-gateway; fi &&
             protoc -I/proto --go_out=internal/router --go_opt=paths=source_relative --go-grpc_out=internal/router --go-grpc_opt=paths=source_relative /proto/router.proto &&
             go build -o aura-gateway-bin main.go &&
             ./aura-gateway-bin"
    depends_on:
      - router
      - mcp-server

  # UI Dashboard (Bun/Next.js)
  dashboard:
    image: oven/bun:alpine
    container_name: aura-dashboard
    volumes:
      - ./services/dashboard:/app
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://aura-gateway:8080
    command: >
      sh -c "if [ ! -f package.json ]; then
               echo 'Initializing Next.js with Bun...' &&
               mkdir -p /tmp/aura_backup &&
               mv src /tmp/aura_backup/ 2>/dev/null || true &&
               bun x create-next-app@latest . --typescript --tailwind --eslint --app --src-dir --import-alias '@/*' --yes &&
               mv /tmp/aura_backup/src/* src/ 2>/dev/null || true &&
               bun add lucide-react clsx tailwind-merge;
             else
               bun install;
             fi && 
             bun dev"

  # Marketing Website (Node/Vite)
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      target: dev
    container_name: aura-website
    volumes:
      - ./website:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev"

  # Open-Source Local Meta LLM Engine
  ollama:
    image: ollama/ollama:latest
    container_name: aura-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Overriding the default entrypoint lets us use shell scripting
    entrypoint: ["/usr/bin/sh", "-c"]
    command: >
      "ollama serve & 
       sleep 5 && 
       ollama pull llama3.2 && 
       wait"

volumes:
  go_modules:
  cargo_cache:
  ollama_data: