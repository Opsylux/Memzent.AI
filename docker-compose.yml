services:
  # Valkey Caching Layer
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    command: [ "valkey-server", "--io-threads", "4" ]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Memzent MCP Server (Go)
  mcp-server:
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    container_name: memzent-mcp-server
    ports:
      - "50052:50052"
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - VALKEY_ADDR=valkey:6379
      #- VALKEY_ADDR=127.0.0.1:6379
    volumes:
      - ./services/mcp-server:/app
    working_dir: /app

  # Intelligence Layer (Vector Store)
  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: memzent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5



  # Memzent Semantic Router (Rust)
  router:
    build:
      context: .
      dockerfile: ./services/router/Dockerfile
    container_name: memzent-router
    volumes:
      # Keep these to share source files
      - ./services/router:/app
      - ./proto:/proto
      # Cache for ML models mapped to avoid redownloading
      - ./.cache/huggingface:/root/.cache
      # Keeps heavy compilation artifacts strictly inside the fast Linux container
      - /app/target
    environment:
      QDRANT_URL: "http://qdrant:6334"
    working_dir: /app
    command: cargo run
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'listening' /proc/1/fd/1 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Memzent Gateway (Go) - Optimized
  # Uncomment and configure to run in Docker.
  # Copy .env.example to .env and fill in your keys.
  # gateway:
  #   build:
  #     context: .
  #     dockerfile: services/gateway/Dockerfile
  #   container_name: memzent-gateway
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./services/gateway:/app
  #     - ./proto:/proto
  #     - ./migrations:/app/migrations
  #     - go_modules:/go/pkg/mod
  #   env_file: .env
  #   environment:
  #     - VALKEY_URL=valkey:6379
  #     - OLLAMA_URL=http://host.docker.internal:11434
  #     - OLLAMA_MODEL=llama3.2
  #     - ROUTER_URL=router:50051
  #   command: >
  #     sh -c "if [ ! -f go.mod ]; then go mod init memzent-gateway; fi &&
  #            protoc -I/proto --go_out=internal/router --go_opt=paths=source_relative --go-grpc_out=internal/router --go-grpc_opt=paths=source_relative /proto/router.proto &&
  #            go mod tidy &&
  #            go build -o memzent-gateway-bin main.go &&
  #            ./memzent-gateway-bin"
  #   depends_on:
  #     - router
  #     - mcp-server

  # UI Dashboard (Bun/Next.js)
  dashboard:
    image: oven/bun:alpine
    container_name: memzent-dashboard
    volumes:
      - ./services/dashboard:/app
    working_dir: /app
    ports:
      - "3002:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://host.docker.internal:8080
      - GATEWAY_INTERNAL_URL=http://host.docker.internal:8080
    command: >
      sh -c "bun install && bun dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Marketing Website (Node/Vite)
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      target: dev
    container_name: memzent-website
    volumes:
      - ./website:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      - VITE_APP_URL=http://localhost:3002
      - VITE_GATEWAY_URL=http://localhost:8080
      - GATEWAY_INTERNAL_URL=http://memzent-gateway:8080
    command: >
      sh -c "npm install && npm run dev -- --host"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

