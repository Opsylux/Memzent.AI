services:
  # Valkey Caching Layer
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    command: [ "valkey-server", "--io-threads", "4" ]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Memzent MCP Server (Go)
  mcp-server:
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    container_name: memzent-mcp-server
    ports:
      - "50052:50052"
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - VALKEY_ADDR=valkey:6379
      #- VALKEY_ADDR=127.0.0.1:6379
    volumes:
      - ./services/mcp-server:/app
    working_dir: /app

  # Intelligence Layer (Vector Store)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memzent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    # S3 snapshot storage (disaster recovery). The router triggers snapshots on a
    # schedule (see SNAPSHOT_INTERVAL_HOURS); Qdrant uploads them to this bucket
    # automatically. Uncomment and fill in real credentials to enable offsite DR.
    # Without these, snapshots are still created but stored on the local volume.
    # environment:
    #   QDRANT__STORAGE__SNAPSHOTS_CONFIG__SNAPSHOTS_STORAGE: s3
    #   QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__BUCKET: memzent-qdrant-snapshots
    #   QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__REGION: us-east-1
    #   QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__ACCESS_KEY: ${QDRANT_S3_ACCESS_KEY}
    #   QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__SECRET_KEY: ${QDRANT_S3_SECRET_KEY}



  # Memzent Semantic Router (Rust)
  router:
    build:
      context: .
      dockerfile: ./services/router/Dockerfile
    container_name: memzent-router
    volumes:
      # Keep these to share source files
      - ./services/router:/app
      - ./proto:/proto
      # Cache for ML models mapped to avoid redownloading
      - ./.cache/huggingface:/root/.cache
      # Keeps heavy compilation artifacts strictly inside the fast Linux container
      - /app/target
    environment:
      QDRANT_URL: "http://qdrant:6334"
      # Disaster-recovery snapshot cadence (hours). Set to 0 to disable.
      SNAPSHOT_INTERVAL_HOURS: "24"
    working_dir: /app
    command: cargo run
    depends_on:
      qdrant:
        condition: service_healthy

  # Memzent Gateway (Go)
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.prod
    container_name: memzent-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      VALKEY_URL: valkey:6379
      ROUTER_URL: router:50051
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      - router
      - mcp-server
      - valkey
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # UI Dashboard (Bun/Next.js)
  dashboard:
    image: oven/bun:alpine
    container_name: memzent-dashboard
    volumes:
      - ./services/dashboard:/app
    working_dir: /app
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080}
      GATEWAY_INTERNAL_URL: ${GATEWAY_INTERNAL_URL:-http://memzent-gateway:8080}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    command: >
      sh -c "bun install && bun dev"

  # Marketing Website (Node/Vite)
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      target: dev
    container_name: memzent-website
    volumes:
      - ./website:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_APP_URL: ${VITE_APP_URL:-http://localhost:3002}
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8080}
      GATEWAY_INTERNAL_URL: ${GATEWAY_INTERNAL_URL:-http://memzent-gateway:8080}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    command: >
      sh -c "npm install && npm run dev -- --host"

  # # Open-Source Local Meta LLM Engine
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: memzent-ollama
  #   ports:
  #     - "11434:11434"
