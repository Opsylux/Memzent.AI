services:
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    command: [ "valkey-server", "--io-threads", "4" ]

  mcp-server:
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    container_name: aura-mcp-server
    depends_on:
      - valkey
    environment:
      - VALKEY_ADDR=valkey:6379
    ports:
      - "50052:50052"
    volumes:
      - ./services/mcp-server:/app
    working_dir: /app

  # 1. Intelligence Layer (Vector Store)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aura-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  # 3. Governance Layer
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_DB: aura_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  # 4. Aura Semantic Router (Rust) - Auto-Init
  router:
    build:
      context: .
      dockerfile: ./services/router/Dockerfile
    container_name: aura-router
    volumes:
      - ./services/router:/app
      - ./proto:/proto
      - cargo_cache:/usr/local/cargo/registry
    environment:
      QDRANT_URL: "http://qdrant:6333"
    working_dir: /app
    command: >
      sh -c "if [ ! -f Cargo.toml ]; then 
               cargo init --bin . &&
               cargo add tonic@0.11 prost@0.12 qdrant-client@1.10 tokio@1.0 --features tokio/full &&
               cargo add serde@1.0 --features serde/derive &&
               cargo add serde_json;
             fi && 
             cargo run"
    depends_on:
      - qdrant

  # 5. Aura Gateway (Go) - Auto-Init
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: aura-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway:/app
      - ./proto:/proto
      - go_modules:/go/pkg/mod
    environment:
      # - OPENAI_API_KEY=your_key_here
      - OPENAI_MODEL=gpt-4o-mini
      - JWT_SECRET=aura-enterprise-secret-2026
      - OLLAMA_ENABLED=true
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
    # BOOTSTRAP LOGIC:
    command: >
      sh -c "if [ ! -f go.mod ]; then 
               go mod init aura-gateway && 
               go get github.com/valkey-io/valkey-go &&
               go get google.golang.org/grpc &&
               go get google.golang.org/protobuf;
             fi && 
             protoc -I/proto --go_out=internal/router --go_opt=paths=source_relative --go_opt=Mrouter.proto=github.com/nampally/aura/services/gateway/internal/router --go-grpc_out=internal/router --go-grpc_opt=paths=source_relative --go-grpc_opt=Mrouter.proto=github.com/nampally/aura/services/gateway/internal/router /proto/router.proto &&
             go mod tidy &&
             go run main.go"
  dashboard:
    image: oven/bun:alpine
    container_name: aura-dashboard
    volumes:
      - ./services/dashboard:/app
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:8080
    command: >
      sh -c "if [ ! -f package.json ]; then
               echo 'Initializing Next.js with Bun...' &&
               mkdir -p /tmp/aura_backup &&
               mv src /tmp/aura_backup/ 2>/dev/null || true &&
               bun x create-next-app@latest . --typescript --tailwind --eslint --app --src-dir --import-alias '@/*' --yes &&
               mv /tmp/aura_backup/src/* src/ 2>/dev/null || true &&
               bun add lucide-react clsx tailwind-merge;
             else
               bun install;
             fi && 
             bun dev"

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      target: dev
    container_name: aura-website
    volumes:
      - ./website:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev"

  # 6. Open-Source Local Meta LLM Engine
  ollama:
    image: ollama/ollama:latest
    container_name: aura-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      
volumes:
  go_modules:
  cargo_cache:
  ollama_data:
